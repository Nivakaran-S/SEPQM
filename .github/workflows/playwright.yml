name: Playwright Fixture Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-fixtures:
    name: Run Setup/Teardown Tests
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install NPM Dependencies
        run: npm ci

      - name: Install Playwright Browsers & Dependencies
        run: npx playwright install --with-deps

      - name: Run Playwright Tests (List Reporter for Clear Logs)
        # Using the list reporter ensures console.logs are printed exactly as they happen
        run: npx playwright test tests/fixture-demo.spec.ts --reporter=list

      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always() # Ensures the report uploads even if a test fails
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7